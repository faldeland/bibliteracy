# Supabase project configuration.
# Used by the Supabase CLI for both local development (via Docker) and for
# linking against a remote project (`supabase link --project-ref ...`).

# A short identifier for this Supabase project. Local-only — does NOT need to
# match the cloud project's ref. The CLI uses this to namespace the local
# Docker stack so multiple projects on one machine don't collide.
project_id = "bibliteracy"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Primary domain Supabase falls back to in magic-link emails when the client's
# `emailRedirectTo` isn't in the allow-list below. Production custom domain
# is the canonical user-facing URL.
site_url = "https://www.bibliteracy.com"
# Allow-list for `emailRedirectTo` URLs the client can request. Supabase
# accepts `*` as a wildcard within a single hostname segment (it does NOT
# cross dots). The order doesn't matter; just keep every environment we
# expect to sign in from in this list:
#   • Production (apex + www)
#   • Production deployment on the default Vercel domain
#   • Vercel preview deployments (any branch / hash)
#   • Local dev
# After editing this file, run `supabase config push` (or `npm run db:push`
# does not cover auth — use `npx supabase config push --linked`) to mirror
# these settings onto the linked remote project.
additional_redirect_urls = [
  "https://bibliteracy.com/auth/callback",
  "https://www.bibliteracy.com/auth/callback",
  "https://bibliteracy.vercel.app/auth/callback",
  "https://bibliteracy-*.vercel.app/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

# Stay signed in for 30 days after the last visit (middleware refreshes the
# session on each request). Without this, the hosted project may use a
# shorter dashboard default. Use 720h — Go duration syntax has no "d" unit.
[auth.sessions]
inactivity_timeout = "720h"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

# In local dev, magic-link emails are captured by Inbucket at
# http://localhost:54324 instead of being sent.
[auth.email.template.magic_link]
subject = "Your Bibliteracy magic link"

[edge_runtime]
enabled = true
inspector_port = 8083
