# Supabase project configuration.
# Used by the Supabase CLI for both local development (via Docker) and for
# linking against a remote project (`supabase link --project-ref ...`).

# A short identifier for this Supabase project. Local-only — does NOT need to
# match the cloud project's ref. The CLI uses this to namespace the local
# Docker stack so multiple projects on one machine don't collide.
project_id = "bibliteracy"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

# In local dev, magic-link emails are captured by Inbucket at
# http://localhost:54324 instead of being sent.
[auth.email.template.magic_link]
subject = "Your Bibliteracy magic link"

[edge_runtime]
enabled = true
inspector_port = 8083
