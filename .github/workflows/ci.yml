name: ci

# Runs lint, typecheck, the full Vitest unit-test suite, and a production
# build on every PR and on every push to main. The matrix stays single-node
# (Node 22 LTS) for now; expand to a matrix when we add platform-specific
# code.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Build (production)
        # Build last so coverage / typecheck failures surface first; failure
        # here means the change broke a Server Component, route handler, or
        # type that only the Next compiler validates.
        env:
          # Skip Supabase + LiveKit env-var checks during the build; the app
          # is designed to fall back to local-only mode without them.
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
